<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN KEY TOOL</title>

<style>

body{
background:#111827;
color:white;
font-family:Arial;
text-align:center;
padding-top:80px;
}

.box{
background:#1f2937;
padding:30px;
border-radius:10px;
width:320px;
margin:auto;
}

input,select,button{

width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;

}

button{
background:#22c55e;
color:white;
font-weight:bold;
}

#result{
margin-top:15px;
}

</style>

</head>

<body>

<div class="box">

<h2>ADMIN CREATE KEY</h2>

<input id="key" placeholder="Nhập key">

<select id="hours">

<option value="1">1 giờ</option>
<option value="6">6 giờ</option>
<option value="12">12 giờ</option>
<option value="24">24 giờ</option>
<option value="72">3 ngày</option>

</select>

<button onclick="createKey()">Tạo Key</button>

<p id="result"></p>

</div>

<script>

const SERVER="http://10.84.112.60:5000";

function createKey(){

let key=document.getElementById("key").value;
let hours=document.getElementById("hours").value;

fetch(SERVER+"/create",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

key:key,
hours:hours

})

})

.then(r=>r.json())

.then(data=>{

document.getElementById("result").innerHTML="Tạo key: "+data.key;

})

.catch(()=>{

document.getElementById("result").innerHTML="Server lỗi";

})

}

</script>

</body>
</html>
