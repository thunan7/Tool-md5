<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>TX TOOL ADMIN</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
margin:auto;
}

input,select,button{

width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;

}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#result{
margin-top:20px;
color:#22c55e;
}

</style>

</head>

<body>

<div class="box">

<h2>ADMIN CREATE KEY</h2>

<input id="key" placeholder="Nhập key">

<select id="hours">

<option value="1">1 giờ</option>
<option value="6">6 giờ</option>
<option value="12">12 giờ</option>
<option value="24">24 giờ</option>
<option value="48">2 ngày</option>
<option value="72">3 ngày</option>

</select>

<button onclick="createKey()">Tạo Key</button>

<p id="result"></p>

</div>

<script>

function createKey(){

let key=document.getElementById("key").value
let hours=document.getElementById("hours").value

fetch("http://127.0.0.1:5000/create",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

key:key,
hours:hours

})

})

.then(res=>res.json())

.then(data=>{

document.getElementById("result").innerHTML="Đã tạo key: "+key

})

.catch(()=>{

document.getElementById("result").innerHTML="Lỗi kết nối server"

})

}

</script>

</body>
</html>
