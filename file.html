<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>TX TOOL ADMIN</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding:40px;
}

.box{
background:#1e293b;
width:360px;
margin:auto;
padding:30px;
border-radius:12px;
}

input,select,button{

width:100%;
padding:12px;
margin-top:12px;
border-radius:6px;
border:none;

}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#result{
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>TX TOOL ADMIN</h2>

<input id="key" placeholder="Nhập key cần tạo">

<select id="hours">

<option value="1">1 giờ</option>
<option value="6">6 giờ</option>
<option value="12">12 giờ</option>
<option value="24">24 giờ</option>
<option value="72">3 ngày</option>
<option value="168">7 ngày</option>

</select>

<button onclick="createKey()">Tạo Key</button>

<p id="result"></p>

</div>

<script>

const SERVER="http://127.0.0.1:5000"

function createKey(){

let key=document.getElementById("key").value
let hours=document.getElementById("hours").value

if(key==""){

document.getElementById("result").innerHTML="Nhập key trước!"
return

}

fetch(SERVER+"/create",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

key:key,
hours:hours

})

})

.then(res=>res.json())

.then(data=>{

if(data.status=="created"){

document.getElementById("result").innerHTML="✅ Đã tạo key: "+data.key

}else{

document.getElementById("result").innerHTML="❌ Lỗi tạo key"

}

})

.catch(()=>{

document.getElementById("result").innerHTML="❌ Không kết nối server"

})

}

</script>

</body>
</html>
