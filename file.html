<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TX TOOL ADMIN</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:320px;
margin:auto;
}

input,select,button{

width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;

}

button{
background:#22c55e;
color:white;
font-weight:bold;
}

#result{
margin-top:15px;
}

</style>
</head>

<body>

<div class="box">

<h2>ADMIN CREATE KEY</h2>

<input id="key" placeholder="Nhập key">

<select id="hours">

<option value="1">1 giờ</option>
<option value="6">6 giờ</option>
<option value="12">12 giờ</option>
<option value="24">24 giờ</option>
<option value="72">3 ngày</option>

</select>

<button onclick="create()">Tạo Key</button>

<p id="result"></p>

</div>

<script>

const SERVER="http://127.0.0.1:5000"

function create(){

let key=document.getElementById("key").value
let hours=document.getElementById("hours").value

fetch(SERVER+"/create",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

key:key,
hours:hours

})

})

.then(r=>r.json())

.then(data=>{

if(data.status=="created"){

document.getElementById("result").innerHTML="Đã tạo key: "+data.key

}else{

document.getElementById("result").innerHTML="Lỗi tạo key"

}

})

.catch(()=>{

document.getElementById("result").innerHTML="Server lỗi"

})

}

</script>

</body>
</html>
