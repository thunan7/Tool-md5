<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sunwin</title>

<style>
:root{
  --accent:#00ccff;
  --bg:#000814;
  --bg2:#001a26;
  --text:#eaf6ff;
  --panel:#0b2230cc;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:linear-gradient(180deg,var(--bg2),var(--bg));
  overflow:hidden;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
}

iframe{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  border:none;
}

.pill{
  position:fixed;
  top:10px;
  padding:6px 12px;
  border-radius:10px;
  font-weight:700;
  z-index:10000;
  background:var(--accent);
  color:#001018;
  box-shadow:0 6px 18px rgba(0,204,255,.25);
  user-select:none;
}

#logout{left:10px;cursor:pointer}
#balance{right:10px}

#botWrap{
  position:fixed;
  top:50px;
  left:50px;
  z-index:9999;
  display:flex;
  align-items:center;
  gap:10px;
  touch-action:none;
  cursor:grab;
}

#botWrap:active{cursor:grabbing}

#robot{
  width:120px;
  height:auto;
  user-select:none;
  pointer-events:none;
}

#botPanel{
  min-width:260px;
  max-width:min(70vw,420px);
  background:var(--panel);
  backdrop-filter:blur(6px);
  border:1px solid #0ea5b7;
  border-radius:12px;
  padding:10px 12px;
  color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,.35),
  inset 0 0 0 1px rgba(255,255,255,.04);
}

#botHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:6px;
}

.badge{
  background:#012734;
  border:1px solid #0ea5b7;
  padding:2px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

#statusDot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#aaa;
  margin-left:6px;
}

#summaryLine{
  font-weight:800;
  font-size:16px;
  margin:6px 0 8px;
}

#botBody p{
  margin:4px 0;
  font-size:14px;
}

#progressBarWrap{
  position:relative;
  height:6px;
  background:#0a2a38;
  border-radius:999px;
  overflow:hidden;
  margin-top:8px;
}

#progressBar{
  position:absolute;
  inset:0 100% 0 0;
  background:linear-gradient(90deg,#22d3ee,#0ea5b7);
}

#updatedAt{
  margin-top:6px;
  font-size:12px;
  opacity:.8;
}

#hint{
  position:absolute;
  top:-24px;
  left:0;
  background:#03202b;
  border:1px solid #075b6b;
  color:#b9ecff;
  padding:2px 8px;
  border-radius:8px;
  font-size:12px;
}

</style>
</head>

<body>

<div id="logout" class="pill" onclick="window.location.href='index.html'">
Đăng xuất
</div>

<div id="balance" class="pill">0đ</div>

<div id="botWrap">

<div id="hint">Kéo giữ để di chuyển</div>

<img id="robot"
src="https://i.postimg.cc/63bdy9D9/robotics-1.gif"
alt="Robot"/>

<div id="botPanel">

<div id="botHeader">
<div class="badge">BOT DỰ ĐOÁN</div>

<div style="display:flex;align-items:center;gap:6px">
<span style="font-size:12px">Trạng thái</span>
<div id="statusDot"></div>
</div>

</div>

<div id="summaryLine">Đang tải…</div>

<div id="botBody">

<p>Tỉ lệ: <span id="ty_le_thanh_cong">…</span></p>

<p>Độ tin cậy: <span id="ty_le_thanh_cong">…</span></p>

<p>Dự đoán: <span id="duDoan">…</span></p>

<p>Phiên: <span id="phien">…</span></p>

<div id="progressBarWrap">
<div id="progressBar"></div>
</div>

<div id="updatedAt">Đang tải dữ liệu…</div>

</div>
</div>
</div>

<iframe src="https://web.sunwin.lt/?affId=Sunwin"></iframe>

<script>

const API_URL="https://sunlaymaynkx.hacksieucap.pro/ttsunver2"

async function pull(){

try{

const r=await fetch(API_URL)

const j=await r.json()

document.getElementById("duDoan").innerText=j.du_doan_van_sau

document.getElementById("phien").innerText=Number(j.phien)+1

document.getElementById("ty_le_thanh_cong").innerText=j.ty_le_thanh_cong

document.getElementById("updatedAt").innerText="Cập nhật "+new Date().toLocaleTimeString()

}catch(e){

document.getElementById("updatedAt").innerText="Lỗi tải dữ liệu"

}

}

pull()

setInterval(pull,8000)

</script>

</body>
</html>
