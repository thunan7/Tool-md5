<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>THUAN AI ADMIN</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:60px;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:320px;
margin:auto;
box-shadow:0 0 20px black;
}

h2{
margin-bottom:20px;
}

input,select,button{

width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:15px;

}

input{
background:#334155;
color:white;
}

select{
background:#334155;
color:white;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#result{
margin-top:15px;
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>THUAN AI TOOL ADMIN</h2>

<input id="key" placeholder="Nhập key">

<select id="hours">

<option value="1">1 giờ</option>
<option value="6">6 giờ</option>
<option value="12">12 giờ</option>
<option value="24">24 giờ</option>
<option value="72">3 ngày</option>
<option value="168">7 ngày</option>

</select>

<button onclick="createKey()">Tạo Key</button>

<p id="result"></p>

</div>

<script>

// IP SERVER PYTHON CỦA M
const SERVER = "http://127.0.0.1:5000";

function createKey(){

let key=document.getElementById("key").value;
let hours=document.getElementById("hours").value;

if(key==""){

document.getElementById("result").innerHTML="Nhập key!";
return;

}

fetch(SERVER+"/create",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

key:key,
hours:hours

})

})

.then(response=>response.json())

.then(data=>{

if(data.status=="created"){

document.getElementById("result").innerHTML="Tạo key thành công: "+data.key;

}else{

document.getElementById("result").innerHTML="Lỗi tạo key";

}

})

.catch(error=>{

document.getElementById("result").innerHTML="Không kết nối server";

});

}

</script>

</body>
</html>
