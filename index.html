<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Tài Xỉu MD5</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
max-width:380px;
margin:auto;
}

.data{
margin:10px;
font-size:18px;
}

.red{
color:#ef4444;
font-weight:bold;
}

.green{
color:#22c55e;
font-weight:bold;
}

.predict{
font-size:22px;
margin-top:15px;
}

</style>
</head>

<body>

<h2>🎲 TOOL TÀI XỈU MD5</h2>

<div class="box">

<div class="data">
Phiên: <span id="phien">---</span>
</div>

<div class="data">
MD5: <span id="md5">---</span>
</div>

<div class="data">
Dice: <span id="dice">---</span>
</div>

<div class="data">
Tổng: <span id="tong">---</span>
</div>

<div class="data">
Kết quả: <span id="ketqua">---</span>
</div>

<div class="predict">
🔮 Dự đoán: <span id="predict">---</span>
</div>

</div>

<script>

function duDoan(md5){

if(!md5) return "--"

let last = md5.slice(-1)
let num = last.charCodeAt(0)

if(num % 2 == 0){
return "TÀI"
}else{
return "XỈU"
}

}

async function getData(){

try{

let res = await fetch("https://aims-discussions-nottingham-milton.trycloudflare.com/api/txmd5")

let data = await res.json()

let phien = data.phien
let md5 = data.md5_raw
let trangThai = data.betting_info.trang_thai

document.getElementById("phien").innerText = phien
document.getElementById("md5").innerText = md5

// nếu đang cược (chưa có kết quả)

if(trangThai !== "RESULT"){

document.getElementById("dice").innerText="---"
document.getElementById("tong").innerText="---"
document.getElementById("ketqua").innerText="ĐANG CHỜ"

document.getElementById("predict").innerText = duDoan(md5)

}

// nếu đã có kết quả

if(trangThai === "RESULT"){

let d1 = data.xuc_xac_1
let d2 = data.xuc_xac_2
let d3 = data.xuc_xac_3
let tong = data.tong

document.getElementById("dice").innerText = d1+"-"+d2+"-"+d3
document.getElementById("tong").innerText = tong

if(data.ket_qua.toLowerCase().includes("tài")){
document.getElementById("ketqua").innerHTML="<span class='red'>TÀI</span>"
}else{
document.getElementById("ketqua").innerHTML="<span class='green'>XỈU</span>"
}

document.getElementById("predict").innerText="---"

}

}catch(e){

console.log("API lỗi",e)

}

}

getData()

setInterval(getData,2000)

</script>

</body>
</html>
