<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tool Sunwin</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:350px;
margin:auto;
}

.data{
margin:10px;
font-size:18px;
}

.red{
color:#ef4444;
font-weight:bold;
}

.green{
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<h2>🎲 TOOL SUNWIN</h2>

<div class="box">

<div class="data">
Phiên: <span id="phien">---</span>
</div>

<div class="data">
MD5: <span id="md5">---</span>
</div>

<div class="data">
Dice: <span id="dice">---</span>
</div>

<div class="data">
Tổng: <span id="tong">---</span>
</div>

<div class="data">
Kết quả: <span id="ketqua">---</span>
</div>

</div>

<script>

async function getSunwin(){

try{

let res = await fetch("https://api.sunwin.fake/taixiu")
let data = await res.json()

document.getElementById("phien").innerText=data.session
document.getElementById("md5").innerText=data.md5

let d1=data.dice[0]
let d2=data.dice[1]
let d3=data.dice[2]

let tong=d1+d2+d3

document.getElementById("dice").innerText=d1+"-"+d2+"-"+d3
document.getElementById("tong").innerText=tong

if(tong>=11){

document.getElementById("ketqua").innerHTML="<span class='red'>TÀI</span>"

}else{

document.getElementById("ketqua").innerHTML="<span class='green'>XỈU</span>"

}

}catch(e){

console.log("Lỗi API")

}

}

getSunwin()

setInterval(getSunwin,3000)

</script>

</body>
</html>
