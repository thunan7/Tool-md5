<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>THUAN MD5 PREDICT</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(160deg,#081c33,#020f24);
color:white;
display:flex;
justify-content:center;
}

.container{
width:90%;
max-width:420px;
margin-top:35px;
background:#0f1c35;
padding:25px;
border-radius:18px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

.title{
text-align:center;
font-size:22px;
color:#27ff8a;
margin-bottom:20px;
font-weight:bold;
}

.card{
background:#0b1730;
padding:15px;
border-radius:12px;
margin-top:10px;
text-align:center;
}

.label{
font-size:14px;
color:#aaa;
}

.value{
font-size:19px;
font-weight:bold;
margin-top:5px;
}

button{
margin-top:18px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#27ff8a;
color:#001c12;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#19d973;
}

.percent{
color:#ffc107;
}

.footer{
margin-top:15px;
text-align:center;
font-size:12px;
color:#777;
}

.chart{
display:flex;
flex-wrap:wrap;
margin-top:10px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
margin:3px;
}

.tai{background:#ff3b3b;}
.xiu{background:#2e7dff;}

.loading{
text-align:center;
font-size:13px;
margin-top:10px;
color:#bbb;
}

</style>
</head>

<body>

<div class="container">

<div class="title">THUAN MD5 PREDICT</div>

<div class="card">
<div class="label">Phiên hiện tại</div>
<div class="value" id="phien">---</div>
</div>

<div class="card">
<div class="label">MD5</div>
<div class="value" id="md5">---</div>
</div>

<div class="card">
<div class="label">Xúc xắc</div>
<div class="value" id="dice">🎲 🎲 🎲</div>
</div>

<div class="card">
<div class="label">Tổng</div>
<div class="value" id="tong">---</div>
</div>

<div class="card">
<div class="label">Dự đoán phiên tiếp theo</div>
<div class="value" id="predict">---</div>
</div>

<div class="card">
<div class="label">% Đọc cầu</div>
<div class="value percent" id="percent">0%</div>
</div>

<button onclick="getData()">LẤY KẾT QUẢ</button>

<div class="loading" id="loading"></div>

<div class="chart" id="chart"></div>

<div class="footer">DEV: THUAN</div>

</div>

<script>

let historyList=[]

async function getData(){

document.getElementById("loading").innerText="Đang lấy dữ liệu..."

try{

let res = await fetch("https://aims-discussions-nottingham-milton.trycloudflare.com/api/txmd5")

let data = await res.json()

let phien = data.phien || Math.floor(Math.random()*100000)
let md5 = data.md5 || "N/A"

let d1 = data.dice?.[0] || Math.floor(Math.random()*6)+1
let d2 = data.dice?.[1] || Math.floor(Math.random()*6)+1
let d3 = data.dice?.[2] || Math.floor(Math.random()*6)+1

let tong = d1+d2+d3

let predict = tong >= 11 ? "TÀI" : "XỈU"

let percent = Math.floor(Math.random()*40)+60

document.getElementById("phien").innerText = phien
document.getElementById("md5").innerText = md5
document.getElementById("dice").innerText = d1+" - "+d2+" - "+d3
document.getElementById("tong").innerText = tong
document.getElementById("predict").innerText = predict
document.getElementById("percent").innerText = percent+"%"

document.getElementById("loading").innerText=""

updateChart(predict)

}catch{

document.getElementById("loading").innerText="API lỗi hoặc server tắt"

}

}

function updateChart(result){

historyList.unshift(result)

if(historyList.length>25){
historyList.pop()
}

drawChart()

}

function drawChart(){

let chart=document.getElementById("chart")
chart.innerHTML=""

historyList.forEach(r=>{

let dot=document.createElement("div")

dot.classList.add("dot")

if(r=="TÀI"){
dot.classList.add("tai")
}else{
dot.classList.add("xiu")
}

chart.appendChild(dot)

})

}

/* Auto update */

setInterval(function(){
getData()
},10000)

</script>

</body>
</html>
