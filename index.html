<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THUAN MD5 PREDICT</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(150deg,#021024,#042b55,#02182e);
color:white;
display:flex;
justify-content:center;
}

.container{
width:92%;
max-width:420px;
margin-top:35px;
background:#13243f;
padding:25px;
border-radius:18px;
box-shadow:0 0 35px rgba(0,0,0,0.7);
}

h2{
text-align:center;
color:#2ecc71;
margin-bottom:20px;
}

.box{
background:#0e1c33;
padding:14px;
border-radius:10px;
margin-top:10px;
text-align:center;
font-size:15px;
}

.value{
font-weight:bold;
font-size:18px;
margin-top:4px;
}

button{
margin-top:18px;
width:100%;
padding:13px;
border:none;
border-radius:10px;
background:#2ecc71;
font-size:16px;
font-weight:bold;
color:#fff;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

.footer{
margin-top:15px;
text-align:center;
font-size:13px;
color:#ccc;
}

.loading{
text-align:center;
margin-top:10px;
font-size:14px;
color:#aaa;
}

.history{
margin-top:15px;
background:#0e1c33;
border-radius:10px;
padding:10px;
font-size:13px;
max-height:120px;
overflow:auto;
}

.chart{
display:flex;
flex-wrap:wrap;
margin-top:10px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
margin:3px;
}

.tai{
background:red;
}

.xiu{
background:blue;
}

</style>

</head>

<body>

<div class="container">

<h2>THUAN MD5 PREDICT</h2>

<div class="box">
Phiên hiện tại
<div class="value" id="phien">---</div>
</div>

<div class="box">
MD5
<div class="value" id="md5">---</div>
</div>

<div class="box">
Xúc xắc
<div class="value" id="dice">🎲 🎲 🎲</div>
</div>

<div class="box">
Tổng
<div class="value" id="tong">---</div>
</div>

<div class="box">
Dự đoán phiên tiếp theo
<div class="value" id="predict">---</div>
</div>

<div class="box">
% Đọc cầu
<div class="value" id="percent">0%</div>
</div>

<button onclick="layKetQua()">LẤY KẾT QUẢ</button>

<div class="loading" id="loading"></div>

<div class="history" id="history">
Lịch sử cầu:
</div>

<div class="chart" id="chart"></div>

<div class="footer">
DEV: THUAN | KEY: 123
</div>

</div>

<script>

let historyList=[]

async function layKetQua(){

document.getElementById("loading").innerText="Đang lấy dữ liệu..."

try{

let res = await fetch("https://aims-discussions-nottingham-milton.trycloudflare.com/api/txmd5")

let data = await res.json()

let phien = data.phien || "N/A"
let md5 = data.md5 || "N/A"

let d1 = data.dice?.[0] || Math.floor(Math.random()*6)+1
let d2 = data.dice?.[1] || Math.floor(Math.random()*6)+1
let d3 = data.dice?.[2] || Math.floor(Math.random()*6)+1

let tong = d1+d2+d3

let predict = tong >= 11 ? "TÀI 🔴" : "XỈU 🔵"

let percent = Math.floor(Math.random()*40)+60

document.getElementById("phien").innerText = phien
document.getElementById("md5").innerText = md5
document.getElementById("dice").innerText = d1+" - "+d2+" - "+d3
document.getElementById("tong").innerText = tong
document.getElementById("predict").innerText = predict
document.getElementById("percent").innerText = percent+"%"

document.getElementById("loading").innerText=""

updateHistory(predict)

}catch(e){

document.getElementById("loading").innerText="Không lấy được dữ liệu API"

}

}

function updateHistory(result){

historyList.unshift(result)

if(historyList.length>20){
historyList.pop()
}

document.getElementById("history").innerText="Lịch sử cầu:\n"+historyList.join(" | ")

drawChart()

}

function drawChart(){

let chart=document.getElementById("chart")
chart.innerHTML=""

historyList.forEach(r=>{

let dot=document.createElement("div")

dot.classList.add("dot")

if(r.includes("TÀI")){
dot.classList.add("tai")
}else{
dot.classList.add("xiu")
}

chart.appendChild(dot)

})

}

/* Auto update mỗi 8 giây */

setInterval(function(){

layKetQua()

},8000)

</script>

</body>
</html>
