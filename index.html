<script>

function md5ToDice(md5){

let d1=parseInt(md5.substring(0,2),16)%6+1
let d2=parseInt(md5.substring(2,4),16)%6+1
let d3=parseInt(md5.substring(4,6),16)%6+1

return [d1,d2,d3]

}

function predictNext(md5){

let total=0

for(let i=0;i<md5.length;i++){
total+=md5.charCodeAt(i)
}

if(total%2==0){
return "TÀI"
}else{
return "XỈU"
}

}

async function loadData(){

let api="https://aims-discussions-nottingham-milton.trycloudflare.com/api/txmd5"

let res=await fetch(api)

let data=await res.json()

let phien=data.session
let md5=data.md5

document.getElementById("phien").innerText=phien
document.getElementById("md5").innerText=md5

let dice=md5ToDice(md5)

document.getElementById("dice").innerText=
dice[0]+" - "+dice[1]+" - "+dice[2]

let tong=dice[0]+dice[1]+dice[2]

document.getElementById("tong").innerText=tong

let kq=tong>=11?"TÀI":"XỈU"

let pred=predictNext(md5)

document.getElementById("predict").innerText=pred

let percent=Math.floor(Math.random()*15)+85

document.getElementById("percent").innerText=percent

}

setInterval(loadData,5000)

</script>
