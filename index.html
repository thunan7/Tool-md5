<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN TOOL KEY</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

button{
padding:15px 30px;
font-size:20px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
}

#key{
margin-top:30px;
font-size:25px;
color:#facc15;
}

</style>

</head>

<body>

<h1>ADMIN TOOL KEY</h1>

<button onclick="createKey()">TẠO KEY</button>

<h2 id="key">KEY:</h2>

<script>

const API="https://aims-discussions-nottingham-milton.trycloudflare.com"

async function createKey(){

document.getElementById("key").innerHTML="ĐANG TẠO KEY..."

try{

let r=await fetch(API+"/create_key")

let data=await r.json()

document.getElementById("key").innerHTML="KEY: "+data.key

}catch{

document.getElementById("key").innerHTML="LỖI SERVER"

}

}

</script>

</body>
</html>
