<!DOCTYPE html>
<html>
<head>
<title>THUAN AI KEY</title>
</head>

<body style="background:black;color:cyan;text-align:center;font-family:monospace">

<h1>THUAN AI KEY GENERATOR</h1>

<button onclick="createKey()">TẠO KEY</button>

<h2 id="key"></h2>

<script>

function createKey(){

fetch("http://127.0.0.1:5000/create_key")

.then(res=>res.json())

.then(data=>{
document.getElementById("key").innerHTML="KEY: "+data.key
})

}

</script>

</body>
</html>
