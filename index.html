<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tool Tài Xỉu MD5</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
max-width:380px;
margin:auto;
}

.data{
margin:10px;
font-size:18px;
}

.red{
color:#ef4444;
font-weight:bold;
}

.green{
color:#22c55e;
font-weight:bold;
}

.predict{
font-size:22px;
margin-top:15px;
}

</style>
</head>

<body>

<h2>🎲 TOOL TÀI XỈU MD5</h2>

<div class="box">

<div class="data">
Phiên: <span id="phien">---</span>
</div>

<div class="data">
MD5: <span id="md5">---</span>
</div>

<div class="data">
Dice: <span id="dice">---</span>
</div>

<div class="data">
Tổng: <span id="tong">---</span>
</div>

<div class="data">
Kết quả: <span id="ketqua">---</span>
</div>

<div class="predict">
🔮 Dự đoán: <span id="predict">---</span>
</div>

</div>

<script>

let currentSession=null
let daCoKetQua=false

async function getData(){

try{

let res=await fetch("https://aims-discussions-nottingham-milton.trycloudflare.com/api/txmd5")

let data=await res.json()

// nếu phiên mới
if(currentSession!=data.session){

currentSession=data.session
daCoKetQua=false

document.getElementById("phien").innerText=data.session
document.getElementById("md5").innerText=data.md5

// reset
document.getElementById("dice").innerText="---"
document.getElementById("tong").innerText="---"
document.getElementById("ketqua").innerText="ĐANG CHỜ"

// hiển thị dự đoán ngay khi bắt đầu phiên
document.getElementById("predict").innerText=data.predict

}

// nếu API đã có xúc xắc = phiên kết thúc
if(data.dice && !daCoKetQua){

let d1=data.dice[0]
let d2=data.dice[1]
let d3=data.dice[2]

let tong=d1+d2+d3

document.getElementById("dice").innerText=d1+"-"+d2+"-"+d3
document.getElementById("tong").innerText=tong

if(tong>=11){

document.getElementById("ketqua").innerHTML="<span class='red'>TÀI</span>"

}else{

document.getElementById("ketqua").innerHTML="<span class='green'>XỈU</span>"

}

daCoKetQua=true

}

}catch(e){

console.log("API lỗi")

}

}

getData()

setInterval(getData,2000)

</script>

</body>
</html>
