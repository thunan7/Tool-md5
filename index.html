<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VIP TOOL</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center;padding-top:60px}
.box{background:#1e293b;padding:25px;border-radius:15px;width:300px;margin:auto}
input{width:90%;padding:12px;border:none;border-radius:8px;margin:10px}
button{padding:12px 20px;border:none;border-radius:8px;background:#22c55e;color:white}
</style>
</head>

<body>

<div class="box" id="login">
<h2>🔐 NHẬP KEY</h2>
<input id="key" placeholder="Nhập key...">
<button onclick="checkKey()">Đăng nhập</button>
<p id="msg"></p>
</div>

<div id="tool" style="display:none;">
<h1>🔥 TOOL VIP</h1>
<p>Key hợp lệ 😎</p>
<button onclick="alert('Chức năng demo')">START</button>
</div>

<script>

// Chuỗi bí mật (phải giống file tạo key)
const SECRET = "VIPTOOL";

// Giải mã key
function decodeKey(k){
    try{
        let raw = atob(k);          // Base64 -> chuỗi gốc
        let parts = raw.split("|"); // Tách dữ liệu

        if(parts.length !== 3) return null;

        return {
            secret: parts[0],
            exp: parseInt(parts[1]),
            check: parts[2]
        };
    }catch{
        return null;
    }
}

// Check key
function checkKey(){

    let k = document.getElementById("key").value.trim();
    let data = decodeKey(k);

    if(!data){
        msg.innerText="❌ Key không hợp lệ";
        return;
    }

    if(data.secret !== SECRET){
        msg.innerText="❌ Key giả";
        return;
    }

    let now = Date.now();

    if(now > data.exp){
        msg.innerText="⏱️ Key đã hết hạn";
        return;
    }

    localStorage.setItem("vip_key", k);

    login.style.display="none";
    tool.style.display="block";
}

// Tự đăng nhập
function autoLogin(){

    let k = localStorage.getItem("vip_key");
    if(!k) return;

    let data = decodeKey(k);
    if(!data) return;

    if(Date.now() < data.exp){
        login.style.display="none";
        tool.style.display="block";
    }
}

autoLogin();

</script>

</body>
</html>
