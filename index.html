<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GAME RESULT VIEWER</title>

<style>
body{
margin:0;
font-family:Arial;
background:#081c33;
color:white;
display:flex;
justify-content:center;
}

.container{
width:90%;
max-width:420px;
margin-top:40px;
background:#0f1c35;
padding:25px;
border-radius:16px;
}

.title{
text-align:center;
font-size:22px;
margin-bottom:20px;
color:#27ff8a;
}

.card{
background:#0b1730;
padding:15px;
border-radius:10px;
margin-top:10px;
text-align:center;
}

.label{
color:#aaa;
font-size:14px;
}

.value{
font-size:18px;
font-weight:bold;
margin-top:5px;
}

button{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#27ff8a;
color:black;
font-weight:bold;
}

.loading{
text-align:center;
margin-top:10px;
font-size:13px;
color:#bbb;
}

</style>
</head>

<body>

<div class="container">

<div class="title">GAME RESULT</div>

<div class="card">
<div class="label">Phiên</div>
<div class="value" id="phien">---</div>
</div>

<div class="card">
<div class="label">MD5</div>
<div class="value" id="md5">---</div>
</div>

<div class="card">
<div class="label">Xúc xắc</div>
<div class="value" id="dice">---</div>
</div>

<div class="card">
<div class="label">Tổng</div>
<div class="value" id="tong">---</div>
</div>

<button onclick="getData()">Cập nhật</button>

<div class="loading" id="loading"></div>

</div>

<script>

async function getData(){

document.getElementById("loading").innerText="Đang tải..."

try{

let res = await fetch("API_URL_CUA_BAN")

let data = await res.json()

let phien = data.phien
let md5 = data.md5
let d1 = data.dice[0]
let d2 = data.dice[1]
let d3 = data.dice[2]

let tong = d1 + d2 + d3

document.getElementById("phien").innerText = phien
document.getElementById("md5").innerText = md5
document.getElementById("dice").innerText = d1+"-"+d2+"-"+d3
document.getElementById("tong").innerText = tong

document.getElementById("loading").innerText=""

}catch(e){

document.getElementById("loading").innerText="Không lấy được dữ liệu"

}

}

setInterval(getData,10000)

</script>

</body>
</html>
