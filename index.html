<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>THUAN MD5 PREDICT</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(160deg,#021024,#041f44,#051b2e);
color:white;
display:flex;
justify-content:center;
}

.container{
width:90%;
max-width:420px;
margin-top:40px;
background:#14233b;
padding:25px;
border-radius:18px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h2{
text-align:center;
color:#2ecc71;
margin-bottom:20px;
}

.box{
background:#0e1c33;
padding:14px;
border-radius:10px;
margin-top:10px;
text-align:center;
font-size:15px;
}

.value{
font-weight:bold;
font-size:17px;
margin-top:4px;
}

button{
margin-top:18px;
width:100%;
padding:13px;
border:none;
border-radius:10px;
background:#2ecc71;
font-size:16px;
font-weight:bold;
color:#fff;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

.footer{
margin-top:15px;
text-align:center;
font-size:13px;
color:#ccc;
}

</style>
</head>

<body>

<div class="container">

<h2>THUAN MD5 PREDICT</h2>

<div class="box">
Phiên hiện tại
<div class="value" id="phien">---</div>
</div>

<div class="box">
MD5
<div class="value" id="md5">---</div>
</div>

<div class="box">
Xúc xắc
<div class="value" id="dice">...</div>
</div>

<div class="box">
Tổng
<div class="value" id="tong">...</div>
</div>

<div class="box">
Dự đoán phiên tiếp theo
<div class="value" id="predict">...</div>
</div>

<div class="box">
% Đọc cầu
<div class="value" id="percent">0%</div>
</div>

<button onclick="layKetQua()">LẤY KẾT QUẢ</button>

<div class="footer">
DEV: THUAN | KEY: 123
</div>

</div>

<script>

async function layKetQua(){

try{

let res = await fetch("https://aims-discussions-nottingham-milton.trycloudflare.com/api/txmd5");

let data = await res.json();

let phien = data.phien || "N/A";
let md5 = data.md5 || "N/A";

let d1 = data.dice?.[0] || 0;
let d2 = data.dice?.[1] || 0;
let d3 = data.dice?.[2] || 0;

let tong = d1 + d2 + d3;

let predict = tong >= 11 ? "TÀI" : "XỈU";

let percent = Math.floor(Math.random()*40)+60;

document.getElementById("phien").innerText = phien;
document.getElementById("md5").innerText = md5;
document.getElementById("dice").innerText = d1+"-"+d2+"-"+d3;
document.getElementById("tong").innerText = tong;
document.getElementById("predict").innerText = predict;
document.getElementById("percent").innerText = percent+"%";

}catch(e){

alert("Không lấy được dữ liệu API");

}

}

</script>

</body>
</html>
