<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tool Tài Xỉu</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
max-width:350px;
margin:auto;
}

.data{
margin:10px;
font-size:18px;
}

.red{
color:#ef4444;
font-weight:bold;
}

.green{
color:#22c55e;
font-weight:bold;
}

.predict{
font-size:22px;
margin-top:15px;
}

</style>
</head>

<body>

<h2>🎲 TOOL TÀI XỈU</h2>

<div class="box">

<div class="data">
Phiên: <span id="phien">---</span>
</div>

<div class="data">
MD5: <span id="md5">---</span>
</div>

<div class="data">
Dice: <span id="dice">---</span>
</div>

<div class="data">
Tổng: <span id="tong">---</span>
</div>

<div class="data">
Kết quả: <span id="ketqua">---</span>
</div>

<div class="predict">
🔮 Dự đoán: <span id="predict">---</span>
</div>

</div>

<script>

function duDoan(d1,d2,d3){

let tong=d1+d2+d3
let kq=""

if(d1==1 && d2==1 && d3==1){
kq="XỈU (≈90%)"
}

else if(tong==12 || tong==13){
kq="TÀI (≈70%)"
}

else if(tong<=7){
kq="XỈU (≈65%)"
}

else if(tong>=11){
kq="TÀI (≈65%)"
}

else{
kq="KHÓ ĐOÁN"
}

return kq
}

function fakeData(){

let d1=Math.floor(Math.random()*6)+1
let d2=Math.floor(Math.random()*6)+1
let d3=Math.floor(Math.random()*6)+1

let tong=d1+d2+d3

document.getElementById("phien").innerText=Math.floor(Math.random()*1000000)
document.getElementById("md5").innerText=Math.random().toString(36).substring(2,10)

document.getElementById("dice").innerText=d1+"-"+d2+"-"+d3
document.getElementById("tong").innerText=tong

if(tong>=11){
document.getElementById("ketqua").innerHTML="<span class='red'>TÀI</span>"
}else{
document.getElementById("ketqua").innerHTML="<span class='green'>XỈU</span>"
}

document.getElementById("predict").innerText=duDoan(d1,d2,d3)

}

fakeData()

setInterval(fakeData,5000)

</script>

</body>
</html>
